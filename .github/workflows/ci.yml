name: CI

# Style + audit for every cask and formula in the tap, on manual pushes and
# PRs. The pushes made by the bump-* workflows do NOT trigger this workflow
# (GITHUB_TOKEN pushes never trigger `on: push` — GitHub's recursion guard);
# those paths run the same audit themselves, before pushing.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    name: brew audit
    runs-on: macos-latest
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      # Authenticated GitHub API calls — brew audit --online checks release
      # URLs and livecheck against api.github.com, which rate-limits
      # anonymous CI runners aggressively.
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          # brew refuses to operate on a tap that is a shallow clone.
          fetch-depth: 0

      - name: Install this checkout as the tap
        # Symlink the working copy into brew's tap directory so the casks are
        # auditable under their real fully-qualified token
        # (oomol-lab/tap/lockime) without a second clone.
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/oomol-lab"
          mkdir -p "$TAP_DIR"
          ln -s "$GITHUB_WORKSPACE" "$TAP_DIR/homebrew-tap"

      - name: brew style
        # Styles every .rb in the tap — casks and formulae alike.
        run: brew style oomol-lab/tap

      - name: brew audit (casks)
        run: brew audit --cask --tap oomol-lab/tap --online --strict

      - name: brew audit (formulae)
        # Only when the tap actually has formulae — `brew audit --formula` errors
        # if there are none (e.g. before the first dockswipe release).
        run: |
          set -euo pipefail
          if ls Formula/*.rb >/dev/null 2>&1; then
            brew audit --formula --tap oomol-lab/tap --online --strict
          else
            echo "No formulae in the tap yet — skipping formula audit."
          fi
